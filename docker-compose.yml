services:
  backend:
    build:
      context: ./backend
    container_name: em_backend
    networks:
      - em_network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: em_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - em_network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  em_network:
    name: em_network
    driver: bridge
